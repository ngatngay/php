name: dump

on:
  push:

jobs:
  dump:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: zip full
        run: |
          wget https://getcomposer.org/download/latest-stable/composer.phar
          php composer.phar install

      - name: docs
        run: bash gen_doc.sh
 
      - name: dump
        run: php dump.php
 
      - uses: stefanzweifel/git-auto-commit-action@v5
